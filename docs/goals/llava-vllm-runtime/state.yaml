  intake:
    original_request: "$goal-prep C:/Users/thehb/Documents/RadLE v2/Documents/execplan_llava_vllm_runtime.md; corrected to require two goals with Antigravity Codex extension as editor/pusher and Codex app as GUI-evidence coordinator."
    interpreted_outcome: "Prepare a paired-goal workflow where this Codex app board coordinates Antigravity edits and GUI notebook evidence instead of assuming CLI notebook control."
    input_shape: existing_plan
    audience: "RadLE medical Workbench experiment owner"
    authority: requested
    proof_type: artifact
    completion_proof: "A completed and audited LLaVA-vLLM full-run artifact set for RUN_ID=llava_med_mistral_7b_medical_full_200_cases, proven through paired-goal receipts and Antigravity GUI evidence, or a receipt-backed stop showing why the route cannot proceed."
    likely_misfire: "Using one board for both editing and GUI execution, treating Antigravity Codex as able to run cells/see outputs, or treating CLI checks as notebook runtime proof."
    blind_spots_considered:
      - "The working Jupyter and Workbench extensions are in Antigravity, not in this terminal/CLI path."
      - "Antigravity Codex extension can edit and push but cannot restart kernels, run cells, or inspect live notebook outputs."
      - "This Codex app must coordinate through exact prompts and user-pasted evidence."
      - "A pushed notebook is not proof that the live GUI smoke/full run worked."
      - "Changes must stay isolated from OctoMed, InternVL, MedGemma, and the official benchmark path."
      - "SGLang already failed despite all shims, clean template load, and correct image-token insertion."
      - "The original Microsoft checkpoint is original LLaVA layout; vLLM needs HF-format weights, not config relabeling."
    existing_plan_facts:
      - "Source plan: Documents/execplan_llava_vllm_runtime.md."
      - "Paired editor goal: docs/goals/llava-vllm-antigravity-extension/goal.md."
      - "Parent SSOT: Documents/execplan_medical_workbench_runtime.md points to the child LLaVA-vLLM plan as authoritative."
      - "Claude handoff says begin at Milestone 1."
      - "SGLang abandonment evidence from Workbench HEAD 080ec65: all shims applied, Mistral template loaded, prompt_tokens 371->949 = 576 visual tokens, short prompt 24->600, but 4-way probe A/B/C empty and D returned image>."
      - "Probe/smoke outputs were throwaway and not committed; SGLang notebook unchanged at 080ec65."
      - "Future Section 6.5 smoke must hard-fail on empty output, 1-token EOS, <image> placeholder echo, and prompt echo."
      - "Original microsoft/llava-med-v1.5-mistral-7b is original LLaVA weight layout, not HF LlavaForConditionalGeneration; config relabel is not enough."
      - "Candidate checkpoint: chaoyinshe/llava-med-v1.5-mistral-7b-hf; verify live before claiming runtime success."
      - "Fallback only after recorded preferred-checkpoint failure: transformers convert_llava_weights_to_hf.py."
      - "Target notebook: notebooks/RadLE_Medical_Workbench_LLaVA_vLLM_Runtime.ipynb."
      - "Run contract: RUN_ID=llava_med_mistral_7b_medical_full_200_cases, 200 cases, 263 images, TEST_LIMIT=None, RESUME=True, MAX_OUTPUT_TOKENS=2048."
      - "vLLM args include --limit-mm-per-prompt {\"image\": 5}; use MODEL_DTYPE=float16 unless vLLM refuses with recorded evidence."
      - "Keep the standard RadLE prompt and OpenAI-style base64 data URL image payload from src/radle_benchmark.py."
      - "Do not add controls, SGLang shims, sitecustomize hacks, or chat-template hacks."
      - "Do not promote or sync while integrity problems or repair targets remain unless the user explicitly overrides."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  exact_human_approval_can_terminal_wait: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  two_goal_coordination_required: true
  no_cli_notebook_runtime_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

