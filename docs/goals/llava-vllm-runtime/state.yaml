  status: active
  paired_goal:
    slug: "llava-vllm-antigravity-extension"
    path: "docs/goals/llava-vllm-antigravity-extension/goal.md"
    role: "Antigravity Codex extension edits repo/notebook files and pushes to GitHub; it does not run kernels, execute cells, or inspect notebook outputs."
  oracle:
    signal: "Paired Antigravity edit/push receipts plus user-pasted Antigravity GUI notebook evidence prove llava_med_mistral_7b_medical_full_200_cases completed with audit integrity, guarded promotion, answer-free public exports, runtime provenance, and synced run bundle."
