# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Antigravity Codex extension edits for LLaVA-vLLM Workbench"
  slug: "llava-vllm-antigravity-extension"
  kind: existing_plan
  tranche: "Perform only coordinator-approved edit/push slices for the LLaVA-vLLM Workbench route."
  status: done
  paired_goal:
    slug: "llava-vllm-runtime"
    path: "docs/goals/llava-vllm-runtime/goal.md"
    role: "Codex app coordinator and GUI evidence reviewer."
  oracle:
    signal: "Antigravity Codex returns bounded edit/push receipts requested by the Codex app coordinator, without claiming notebook runtime success."
    cadence: "after each coordinator-approved edit/push slice"
    final_proof: "Receipt includes changed files, branch/commit/PR evidence when pushed, static validation or review notes, and any blocked GUI/runtime needs to paste back into the Codex app goal."
  intake:
    original_request: "Create the Antigravity Codex extension side of a two-goal LLaVA-vLLM Workbench workflow."
    interpreted_outcome: "Use Antigravity Codex only for file edits and GitHub push handoff, while runtime notebook evidence stays with the GUI/user plus Codex app coordinator loop."
    input_shape: existing_plan
    audience: "RadLE medical Workbench experiment owner"
    authority: requested
    proof_type: artifact
    completion_proof: "Coordinator-approved edits are pushed or otherwise returned with concrete evidence for the Codex app coordinator to review."
    likely_misfire: "Trying to restart kernels, execute cells, inspect notebook outputs, or claim runtime success from static edits."
    blind_spots_considered:
      - "Jupyter and Workbench runtime behavior must be driven through Antigravity GUI, not this extension as an output witness."
      - "The extension can edit and push, but pasted GUI evidence is still required before runtime gates can pass."
      - "The coordinator goal decides the next edit packet after reviewing returned evidence."
      - "SGLang already failed despite a green server and correct visual token insertion; do not mistake superficial multimodal signals for success."
      - "The original Microsoft checkpoint uses original LLaVA weight layout, so config relabeling is not enough for vLLM."
    existing_plan_facts:
      - "Paired coordinator goal: docs/goals/llava-vllm-runtime/goal.md."
      - "Source plan: Documents/execplan_llava_vllm_runtime.md."
      - "Parent SSOT: Documents/execplan_medical_workbench_runtime.md points to the child LLaVA-vLLM plan as authoritative."
      - "Claude handoff says begin at Milestone 1: verify chaoyinshe/llava-med-v1.5-mistral-7b-hf before implementation claims."
      - "SGLang abandonment evidence from Workbench HEAD 080ec65: all shims applied, Mistral template loaded, prompt_tokens 371->949 = 576 visual tokens, short prompt 24->600, but 4-way probe A/B/C empty and D returned image>."
      - "Probe/smoke outputs were throwaway and not committed; SGLang notebook unchanged at 080ec65."
      - "Future Section 6.5 smoke must hard-fail on empty output, 1-token EOS, <image> placeholder echo, and prompt echo."
      - "Original microsoft/llava-med-v1.5-mistral-7b is original LLaVA weight layout, not HF LlavaForConditionalGeneration; do not solve by config relabel."
      - "Preferred checkpoint: chaoyinshe/llava-med-v1.5-mistral-7b-hf; fallback only after recorded preferred-checkpoint failure: transformers convert_llava_weights_to_hf.py."
      - "Target notebook: notebooks/RadLE_Medical_Workbench_LLaVA_vLLM_Runtime.ipynb."
      - "Target runtime mapping: llava_med_mistral_7b should use chaoyinshe/llava-med-v1.5-mistral-7b-hf and vLLM when coordinator approves that slice."
      - "Do not add controls, SGLang shims, sitecustomize hacks, or chat-template hacks."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  exact_human_approval_can_terminal_wait: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  no_kernel_or_cell_execution: true
  no_runtime_success_claims: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/llava-vllm-antigravity-extension/"
    command: "node C:/Users/thehb/.agents/skills/goalbuddy/surfaces/local-goal-board/scripts/local-goal-board.mjs --goal docs/goals/llava-vllm-antigravity-extension"

active_task: null

